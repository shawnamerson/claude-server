services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN}
    networks:
      - claude-server-network
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --watch

  claude-server:
    build: .
    restart: always
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3000
      - DATA_DIR=/app/data
      - DOMAIN=${DOMAIN}
      - CADDYFILE_PATH=/host-caddyfile/Caddyfile
    volumes:
      - app-data:/app/data
      - ./:/host-caddyfile
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - claude-server-network

volumes:
  app-data:
  caddy-data:
  caddy-config:

networks:
  claude-server-network:
    name: claude-server-network
    driver: bridge
