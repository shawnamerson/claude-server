services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN}
    networks:
      - claude-server-network
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --watch

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: always
    environment:
      # Allow container lifecycle operations needed by the app
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      EXEC: 1
      # Block dangerous operations
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      BUILD: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - claude-server-network

  claude-server:
    build: .
    restart: always
    depends_on:
      - docker-socket-proxy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3000
      - DATA_DIR=/app/data
      - DOMAIN=${DOMAIN}
      - CADDYFILE_PATH=/host-caddyfile/Caddyfile
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEVER_SLEEP_SLUGS=${NEVER_SLEEP_SLUGS}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    volumes:
      - app-data:/app/data
      - ./:/host-caddyfile
    networks:
      - claude-server-network

volumes:
  app-data:
  caddy-data:
  caddy-config:

networks:
  claude-server-network:
    name: claude-server-network
    driver: bridge
