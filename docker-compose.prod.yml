services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddyfile:/etc/caddy
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN}
    networks:
      - claude-server-network
    # Enable admin API for dynamic config reloads
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

  claude-server:
    build: .
    restart: always
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3000
      - DATA_DIR=/app/data
      - DOMAIN=${DOMAIN}
      - CADDYFILE_PATH=/caddyfile/Caddyfile
    volumes:
      - app-data:/app/data
      - caddyfile:/caddyfile
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - claude-server-network

volumes:
  app-data:
  caddy-data:
  caddy-config:
  caddyfile:

networks:
  claude-server-network:
    name: claude-server-network
    driver: bridge
