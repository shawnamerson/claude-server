services:
  claude-server:
    build: .
    restart: always
    ports:
      - "80:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3000
      - DATA_DIR=/app/data
      - DOMAIN=${DOMAIN}
    volumes:
      - app-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - claude-server-network

volumes:
  app-data:

networks:
  claude-server-network:
    name: claude-server-network
    driver: bridge
